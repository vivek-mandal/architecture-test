<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh}
:root{--bg1:#fff;--bg2:#f5f4f0;--bg3:#eceae4;--tx1:#1a1a1a;--tx2:#5f5e5a;--tx3:#888780;--bd:#d3d1c7;--bdl:#e8e6df;--radius:10px}
@media(prefers-color-scheme:dark){
:root{--bg1:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;--tx1:#e8e6df;--tx2:#b4b2a9;--tx3:#888780;--bd:#444441;--bdl:#333331}
body{background:#18181a;color:#e8e6df}
}
</style>
</head>

    {

          features:["Core tables: users, teams, agents, prompts, executions, conversations","Agent definitions stored as JSON DAGs with schema validation","Prompt versions with full history and diff support","Execution logs with step-by-step state snapshots","Audit records: immutable append-only log","Row-level security for team data isolation"],

          connects:["knowledge","embeddings"]},
        {id:"objstore",name:"Object store",icon:"S3",
          desc:"Scalable file storage for documents, processed outputs, and model artifacts.",
          features:["Bucket-per-team isolation with IAM policies","Lifecycle rules: cold storage after 90 days","Pre-signed URLs for secure direct upload/download","Versioning enabled for document updates","Server-side encryption (SSE-S3 or SSE-KMS)","Cross-region replication for disaster recovery"],

          connects:["files","knowledge"]},
        {id:"cache",name:"Redis cache",icon:"RD",
          desc:"In-memory data store for session state, hot data, and platform-wide caching.",
          features:["Active conversation sessions with TTL-based expiry","Prompt template cache for frequently used prompts","Rate limit counters per API key and team","Feature flag storage for gradual rollouts","LLM response cache for identical prompts","Pub/sub for real-time streaming coordination"],
          techStack:["Redis 7+ with cluster mode","ElastiCache / MemoryStore"],

          techStack:["ClickHouse for analytics","OpenTelemetry Collector","Grafana for visualization"],
          connects:["router","orchestrator","observability"]}
      ]
    },

          desc:"GitOps-based deployment with IaC, automated testing, and progressive delivery.",

          connects:["k8s","envs"]},

          techStack:["LangSmith (AI-native tracing + eval)","OpenTelemetry Collector","Prometheus + Grafana","Loki for logs","Langfuse (open-source alternative)","PagerDuty for alerting"],
          connects:["k8s","telemetry"]},
        {id:"secrets",name:"Secrets management",icon:"KV",
          desc:"Centralized secrets storage with rotation, environment scoping, and audit trails.",
          features:["LLM API keys stored and rotated automatically","Database credentials with lease-based access","Environment-scoped — dev keys never accessible in prod","Dynamic secret generation for short-lived credentials","Audit log for every secret access","K8s external-secrets-operator for pod injection"],
          techStack:["HashiCorp Vault / AWS Secrets Manager","External Secrets Operator"],
          connects:["k8s","router","audit"]},
        {id:"envs",name:"Environments",icon:"EN",
          desc:"Isolated environments for development, testing, and production.",
          features:["Three tiers: dev, staging, prod","Each has its own namespace, secrets, model access","Dev: all models, relaxed quotas, synthetic data","Staging: production models, realistic data, eval benchmarks","Prod: approved models only, full governance","Feature flags for gradual rollout"],

    {
      id:"security",n:"6",name:"Security and governance",tag:"Cross-cutting controls",

        {id:"iam",name:"Identity and access",icon:"ID",

        {id:"datagovern",name:"Data governance",icon:"DG",

          features:["PII detection in prompts and responses — auto-redact or warn","Data classification: public, internal, confidential, restricted","Retention policies per data type","DLP integration — prevent sensitive data reaching external LLMs","Data residency controls — route to region-appropriate providers","Right-to-deletion support for user data"],

        {id:"costctrl",name:"Cost controls",icon:"$",

          desc:"Immutable log of every action — who did what, when, with what result.",
          features:["Append-only audit log — no updates, no deletes","Captures: user actions, API calls, executions, admin changes","Structured: actor, action, resource, timestamp, outcome","Searchable in admin UI","SIEM export (Splunk, Sentinel)","90-day hot, 7-year cold archive"],

        {id:"modelgovern",name:"Model governance",icon:"MG",

          techStack:["Custom guardrail service","LLM-as-judge for quality","Ragas / DeepEval"],

  flow:[
    {step:1,label:"User sends message",detail:"User types a question in the web portal or sends a request via the developer API. The message includes the target agent ID and any attached files.",layer:"access",component:"portal"},
    {step:2,label:"API gateway",detail:"Request hits the API gateway. JWT token is validated, team and role are extracted, rate limits checked. A correlation ID is generated for distributed tracing.",layer:"access",component:"gateway"},
    {step:3,label:"Orchestrator starts",detail:"The orchestrator loads the agent's DAG definition from the prompt registry. It creates a new execution context, initializes session state, and begins stepping through the graph.",layer:"services",component:"orchestrator"},
    {step:4,label:"Context assembly",detail:"The conversation service loads the chat history. The knowledge service embeds the query, runs vector search + BM25, re-ranks results, and returns top-K relevant chunks with source attribution.",layer:"services",component:"knowledge"},
    {step:5,label:"Model router",detail:"The model router evaluates: input tokens, capabilities needed, team's model policy, provider health, and cost. It selects the optimal provider and model, applies the prompt template, and sends the call.",layer:"services",component:"router"},
    {step:6,label:"LLM generates response",detail:"The selected LLM processes the request with full context (system prompt + retrieved docs + history + user message). Response streams back token-by-token through the platform.",layer:"ai",component:"llmproviders"},
    {step:7,label:"Tool execution",detail:"If the LLM invokes a tool (search Jira, query database, run code), the orchestrator routes to the MCP layer. The tool executes in a sandbox, results return, and the LLM is called again.",layer:"ai",component:"tools"},
    {step:8,label:"Response assembly",detail:"The orchestrator assembles the final response: LLM output + source citations + tool results. Output guardrails check for PII leakage, toxicity, and hallucination. Response streams to user.",layer:"services",component:"orchestrator"},
    {step:9,label:"Telemetry captured",detail:"The full execution is logged: tokens used, latency per step, model and provider, cost calculated, sources cited, tools called. Spans sent to OpenTelemetry collector → ClickHouse.",layer:"data",component:"telemetry"},
    {step:10,label:"State persisted",detail:"Conversation updated in PostgreSQL. Execution log stored with step-by-step replay data. Cost attributed to team's budget. Audit record written to immutable log.",layer:"data",component:"opdb"}
  ]
};

function Tab({active,onClick,children}){
  return <button onClick={onClick} style={{padding:"8px 18px",fontSize:14,fontWeight:active?500:400,color:active?"#fff":
  "var(--tx2)",background:active?"#534AB7":"transparent",border:"none",borderRadius:8,cursor:"pointer",transition:"all .15s",whiteSpace:"nowrap"}}>{children}</button>;
}

function Architecture({selLayer,selComp,onSelect}){
  const [localComp,setLocalComp]=useState(selComp||null);
  useEffect(()=>{setLocalComp(selComp||null);},[selComp]);
  const layer=selLayer?DATA.layers.find(l=>l.id===selLayer):null;
  const comp=layer&&localComp?layer.components.find(c=>c.id===localComp):null;

  if(!layer){
    return (
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {DATA.layers.map(ly=>(
          <div key={ly.id}>
            <div onClick={()=>onSelect(ly.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderRadius:12,cursor:"pointer",border:"1px solid var(--bdl)",background:"var(--bg1)",transition:"all .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=ly.color;e.currentTarget.style.transform="translateX(4px)";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--bdl)";e.currentTarget.style.transform="none";}}>
              <div style={{width:36,height:36,borderRadius:10,background:ly.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:600,flexShrink:0}}>{ly.n}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:600,color:"var(--tx1)"}}>{ly.name}</div>
                <div style={{fontSize:12,color:"var(--tx3)",marginTop:1}}>{ly.tag}</div>
              </div>
              <div style={{fontSize:12,color:"var(--tx3)"}}>{ly.components.length} components &#8250;</div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,padding:"6px 0 2px 52px"}}>
              {ly.components.map(c=>(
                <div key={c.id} onClick={e=>{e.stopPropagation();onSelect(ly.id,c.id);}}
                  style={{padding:"5px 12px",borderRadius:7,fontSize:12,fontWeight:500,color:ly.color,background:ly.bg,cursor:"pointer",border:"1px solid transparent",transition:"all .12s"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=ly.color}
                  onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
                  {c.name}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    );
  }

  return (
    <div>
      <button onClick={()=>onSelect(null)} style={{fontSize:13,color:"var(--tx3)",background:"none",border:"none",cursor:"pointer",padding:"0 0 10px",display:"flex",alignItems:"center",gap:4}}>&#8592; All layers</button>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
        <div style={{width:40,height:40,borderRadius:10,background:layer.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:600}}>{layer.n}</div>
        <div>
          <div style={{fontSize:20,fontWeight:600,color:"var(--tx1)"}}>{layer.name}</div>
          <div style={{fontSize:13,color:"var(--tx3)"}}>{layer.tag}</div>
        </div>
      </div>
      <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.7,marginBottom:16}}>{layer.desc}</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
        {layer.components.map(c=>(
          <button key={c.id} onClick={()=>setLocalComp(localComp===c.id?null:c.id)}
            style={{padding:"8px 16px",borderRadius:9,fontSize:13,fontWeight:localComp===c.id?600:400,color:localComp===c.id?"#fff":layer.color,background:localComp===c.id?layer.color:layer.bg,border:"none",cursor:"pointer",transition:"all .15s"}}>{c.name}</button>
        ))}
      </div>
      {comp&&(
        <div style={{borderRadius:14,border:"1px solid var(--bdl)",borderLeft:`4px solid ${layer.color}`,padding:20,background:"var(--bg1)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <div style={{width:32,height:32,borderRadius:8,background:layer.bg,color:layer.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>{comp.icon}</div>
            <div style={{fontSize:18,fontWeight:600,color:"var(--tx1)"}}>{comp.name}</div>
          </div>
          <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.7,marginBottom:16}}>{comp.desc}</p>
          <div style={{fontSize:13,fontWeight:600,color:"var(--tx1)",marginBottom:8}}>Features</div>
          <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:18}}>
            {comp.features.map((f,i)=>(<div key={i} style={{fontSize:13,color:"var(--tx2)",lineHeight:1.6,paddingLeft:12,borderLeft:`2px solid ${layer.color}40`}}>{f}</div>))}
          </div>
          <div style={{fontSize:13,fontWeight:600,color:"var(--tx1)",marginBottom:8}}>Technology</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
            {comp.techStack.map((t,i)=>(<span key={i} style={{fontSize:12,padding:"4px 10px",borderRadius:6,background:"var(--bg3)",color:"var(--tx2)",border:"1px solid var(--bdl)"}}>{t}</span>))}
          </div>
          {comp.connects&&comp.connects.length>0&&(
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"var(--tx1)",marginBottom:8}}>Connects to</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {comp.connects.map((cid,i)=>{
                  const target=DATA.layers.flatMap(l=>l.components).find(x=>x.id===cid);
                  const tLayer=DATA.layers.find(l=>l.components.some(x=>x.id===cid));
                  if(!target)return null;
                  return <button key={i} onClick={()=>onSelect(tLayer.id,cid)} style={{fontSize:12,padding:"4px 12px",borderRadius:6,background:tLayer.color+"18",color:tLayer.color,border:`1px solid ${tLayer.color}35`,cursor:"pointer",fontWeight:500}}>{target.name} &#8250;</button>;
                })}
              </div>
            </div>
          )}
        </div>
      )}
      {!comp&&<div style={{padding:24,textAlign:"center",color:"var(--tx3)",fontSize:14,background:"var(--bg2)",borderRadius:12,border:"1px solid var(--bdl)"}}>Select a component above to explore</div>}
    </div>
  );
}

function RequestFlow({onSelect}){
  const [activeStep,setActiveStep]=useState(null);
  const boxW=186,boxH=54,gapX=18,gapY=32,cols=3;
  const padX=12,padTop=12;
  const positions=DATA.flow.map((_,i)=>{
    const row=Math.floor(i/cols);
    const colInRow=i%cols;
    const col=row%2===0?colInRow:(cols-1-colInRow);
    return{x:padX+col*(boxW+gapX),y:padTop+row*(boxH+gapY),row,col};
  });
  const svgW=padX*2+cols*boxW+(cols-1)*gapX;
  const lastPos=positions[positions.length-1];
  const svgH=lastPos.y+boxH+padTop+8;
  const getLayerColor=s=>{const l=DATA.layers.find(l=>l.id===s.layer||l.components.some(c=>c.id===s.component));return l?.color||"#888";};
  const arrows=[];
  for(let i=0;i<DATA.flow.length-1;i++){
    const from=positions[i],to=positions[i+1];
    const c=getLayerColor(DATA.flow[i+1]);
    if(from.row===to.row){
      const right=to.x>from.x;
      arrows.push({key:i,d:`M${right?from.x+boxW:from.x},${from.y+boxH/2} L${right?to.x:to.x+boxW},${to.y+boxH/2}`,c});
    }else{
      const fx=from.x+boxW/2,fy=from.y+boxH,tx=to.x+boxW/2,ty=to.y,midY=fy+gapY/2;
      arrows.push({key:i,d:`M${fx},${fy} L${fx},${midY} L${tx},${midY} L${tx},${ty}`,c});
    }
  }
  const active=activeStep!==null?DATA.flow[activeStep]:null;
  const activeLayer=active?DATA.layers.find(l=>l.id===active.layer||l.components.some(c=>c.id===active.component)):null;
  const activeComp=active?DATA.layers.flatMap(l=>l.components).find(c=>c.id===active.component):null;
  return(
    <div>
      <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.6,marginBottom:14}}>Follow a user's question end-to-end through every platform component. Click any box to expand.</p>
      <div style={{overflowX:"auto",marginBottom:14,background:"var(--bg2)",borderRadius:14,padding:12,border:"1px solid var(--bdl)"}}>
        <svg width="100%" viewBox={`0 0 ${svgW} ${svgH}`} style={{maxWidth:svgW,display:"block"}}>
          <defs>
            <marker id="fa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="context-stroke" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </marker>
          </defs>
          {arrows.map(a=>(
            <path key={a.key} d={a.d} fill="none" stroke={a.c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" markerEnd="url(#fa)" opacity="0.45"/>
          ))}
          {DATA.flow.map((s,i)=>{
            const p=positions[i];const c=getLayerColor(s);const isA=activeStep===i;
            return(
              <g key={i} onClick={()=>setActiveStep(isA?null:i)} style={{cursor:"pointer"}}>
                <rect x={p.x} y={p.y} width={boxW} height={boxH} rx="12" fill={isA?c:"var(--bg1)"} stroke={c} strokeWidth={isA?2:1} opacity={isA?1:(activeStep!==null?0.55:1)}/>
                <circle cx={p.x+18} cy={p.y+boxH/2} r="11" fill={isA?"rgba(255,255,255,0.2)":c+"20"}/>
                <text x={p.x+18} y={p.y+boxH/2+1} textAnchor="middle" dominantBaseline="central" style={{fontSize:12,fontWeight:700,fill:isA?"#fff":c,fontFamily:"inherit"}}>{s.step}</text>
                <text x={p.x+36} y={p.y+boxH/2+1} dominantBaseline="central" style={{fontSize:12,fontWeight:600,fill:isA?"#fff":"var(--tx1)",fontFamily:"inherit"}}>{s.label.length>17?s.label.slice(0,16)+"…":s.label}</text>
              </g>
            );
          })}
        </svg>
      </div>
      {active&&(
        <div style={{borderRadius:14,border:`1px solid ${activeLayer?.color||"var(--bdl)"}`,borderLeft:`4px solid ${activeLayer?.color}`,padding:18,background:"var(--bg1)",animation:"fadeIn .2s ease"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <div style={{width:32,height:32,borderRadius:16,background:activeLayer?.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700}}>{active.step}</div>
            <div style={{fontSize:17,fontWeight:600,color:"var(--tx1)"}}>{active.label}</div>
          </div>
          <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.7,marginBottom:12}}>{active.detail}</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {activeComp&&activeLayer&&(
              <button onClick={()=>onSelect(activeLayer.id,active.component)} style={{fontSize:12,padding:"6px 14px",borderRadius:8,background:activeLayer.color+"18",color:activeLayer.color,border:`1px solid ${activeLayer.color}35`,cursor:"pointer",fontWeight:600}}>
                Explore {activeComp.name} &#8250;
              </button>
            )}
            {activeStep>0&&(
              <button onClick={()=>setActiveStep(activeStep-1)} style={{fontSize:12,padding:"6px 14px",borderRadius:8,background:"var(--bg3)",color:"var(--tx2)",border:"1px solid var(--bdl)",cursor:"pointer"}}>&#8592; Previous</button>
            )}
            {activeStep<DATA.flow.length-1&&(
              <button onClick={()=>setActiveStep(activeStep+1)} style={{fontSize:12,padding:"6px 14px",borderRadius:8,background:"var(--bg3)",color:"var(--tx2)",border:"1px solid var(--bdl)",cursor:"pointer"}}>Next &#8594;</button>
            )}
          </div>
        </div>
      )}
      {!active&&(
        <div style={{padding:18,textAlign:"center",color:"var(--tx3)",fontSize:13,background:"var(--bg2)",borderRadius:12,border:"1px solid var(--bdl)"}}>Click any step in the flowchart to see what happens at that stage</div>
      )}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("architecture");
  const [selLayer,setSelLayer]=useState(null);
  const [selComp,setSelComp]=useState(null);
  const handleSelect=useCallback((layerId,compId)=>{
    if(layerId===null){setSelLayer(null);setSelComp(null);}
    else{setSelLayer(layerId);setSelComp(compId||null);setTab("architecture");}
  },[]);
  const tabs=[{id:"architecture",label:"Architecture"},{id:"flow",label:"Request flow"}];
  return(
    <div style={{maxWidth:740,margin:"0 auto",padding:"24px 16px"}}>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:24,fontWeight:700,color:"var(--tx1)",marginBottom:2}}>Enterprise AI platform</div>
        <div style={{fontSize:14,color:"var(--tx3)"}}>Interactive architecture explorer — click anything to drill in</div>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:20,background:"var(--bg2)",borderRadius:10,padding:4,width:"fit-content"}}>
        {tabs.map(t=><Tab key={t.id} active={tab===t.id} onClick={()=>{setTab(t.id);if(t.id==="architecture"){setSelLayer(null);setSelComp(null);}}}>{t.label}</Tab>)}
      </div>
      <div style={{minHeight:400}}>
        {tab==="architecture"&&<Architecture selLayer={selLayer} selComp={selComp} onSelect={handleSelect}/>}
        {tab==="flow"&&<RequestFlow onSelect={handleSelect}/>}
      </div>
      <div style={{textAlign:"center",marginTop:32,padding:"16px 0",borderTop:"1px solid var(--bdl)",fontSize:12,color:"var(--tx3)"}}>Enterprise AI Platform Architecture — Internal Documentation</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
