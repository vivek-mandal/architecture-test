<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Enterprise AI Platform — Architecture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh}
:root{--bg1:#fff;--bg2:#f5f4f0;--bg3:#eceae4;--tx1:#1a1a1a;--tx2:#5f5e5a;--tx3:#888780;--bd:#d3d1c7;--bdl:#e8e6df;--acc:#534AB7}
@media(prefers-color-scheme:dark){
:root{--bg1:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;--tx1:#e8e6df;--tx2:#b4b2a9;--tx3:#888780;--bd:#444441;--bdl:#333331}
body{background:#18181a;color:#e8e6df}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .25s ease both}
button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const {useState,useCallback,useEffect,useRef} = React;

const LAYERS = [
  {
    id:"access", n:"1", name:"Access Layer", tag:"Portal · API · Auth",
    color:"#7F77DD", bg:"#EEEDFE",
    desc:"How users and systems reach the platform. A React web portal for business users, a FastAPI-based REST API for developers, and SSO-based authentication with role-based access control.",
    talkingPoints:[
      "Portal is a React app — chat UI, agent builder, knowledge base manager, admin dashboard",
      "API is FastAPI with auto-generated OpenAPI docs and Python/JS SDKs",
      "Auth uses corporate SSO (Azure AD / Okta) — no separate passwords to manage",
      "Four roles: viewer (use agents), builder (create agents), admin (manage team), platform-admin (govern platform)",
      "Every request gets a JWT token checked at the API gateway before anything else happens"
    ],
    components:[
      {id:"portal", name:"Web Portal", icon:"🖥", techYouKnow:"React / JavaScript",
        desc:"Chat interface, visual agent builder, knowledge base manager, prompt studio, usage dashboards. Built in React.",
        details:["Chat UI with streaming responses","Drag-and-drop agent workflow builder","File upload for knowledge bases","Prompt testing playground","Team usage and cost dashboards"]},
      {id:"api", name:"REST API + Gateway", icon:"⚡", techYouKnow:"FastAPI / REST APIs",
        desc:"Single entry point for all requests. Validates auth tokens, applies rate limits, routes to the right service.",
        details:["JWT validation on every request","Rate limiting per API key and team","Auto-generated OpenAPI documentation","SDKs for Python and JavaScript","Request logging with correlation IDs"]},
      {id:"auth", name:"Auth & RBAC", icon:"🔐", techYouKnow:"Azure AD",
        desc:"Enterprise SSO integration. Users log in with corporate credentials. Roles and team memberships control access.",
        details:["SSO via Azure AD (OIDC/SAML)","Four roles: viewer → builder → admin → platform-admin","Team-scoped resources — each team sees only their own","Environment-aware: different permissions in dev vs prod","Auto-provisioning from corporate directory via SCIM"]}
    ]
  },
  {
    id:"core", n:"2", name:"Core AI Services", tag:"Orchestration · RAG · Routing",
    color:"#378ADD", bg:"#E6F1FB",
    desc:"The brain of the platform. Agent orchestration, RAG pipeline, model routing, tool integration via MCP, and prompt management.",
    talkingPoints:[
      "Orchestrator runs agents as DAG workflows — each step can be an LLM call, retrieval, tool use, or conditional branch",
      "Knowledge service is a full RAG pipeline: ingest → chunk → embed → hybrid search → re-rank → cite sources",
      "Model router gives a unified API across providers — teams don't need to know which LLM they're hitting",
      "MCP layer connects agents to enterprise tools like Jira, Salesforce, databases — all sandboxed",
      "Prompt management with versioning, A/B testing, and approval workflows before production"
    ],
    components:[
      {id:"orchestrator", name:"Agent Orchestrator", icon:"🧠", techYouKnow:"Python / Agentic Workflows",
        desc:"Executes AI agents as directed acyclic graphs (DAGs). Each node is an LLM call, retrieval step, tool invocation, or decision branch.",
        details:["Agents defined as DAG workflows — composable, reusable steps","Conversation memory: full history, sliding window, or LLM-summarized","Stateful sessions with checkpointing for long workflows","Streaming output — tokens sent to user as generated","Execution history with step-by-step replay for debugging"]},
      {id:"knowledge", name:"Knowledge & RAG", icon:"📚", techYouKnow:"RAG / Embeddings / HuggingFace",
        desc:"Full RAG pipeline. Async ingestion (upload → chunk → embed → index) and real-time retrieval (query → hybrid search → re-rank → cite).",
        details:["Ingestion: PDF, DOCX, HTML, CSV, PPTX — extracted and cleaned","Chunking: fixed-size, semantic, recursive, parent-child","Embedding: Azure OpenAI ada-003, or self-hosted via HuggingFace","Hybrid search: vector similarity + BM25 keyword in one query","Semantic re-ranker — source attribution on every chunk"]},
      {id:"router", name:"Model Router", icon:"🔀", techYouKnow:"Python / LLM APIs",
        desc:"Unified interface to multiple LLM providers. Teams specify a tier (fast/balanced/frontier), router picks the best model.",
        details:["Single API format — switch providers without code changes","Three tiers: fast (Haiku/4o-mini), balanced (Sonnet), frontier (Opus/4o)","Automatic failover if a provider is down","Response caching for repeated queries","Token counting and cost tracking per call"]},
      {id:"tools", name:"Tool / MCP Integration", icon:"🔧", techYouKnow:"Python / REST APIs",
        desc:"Connects agents to enterprise systems via MCP. Jira, Salesforce, Confluence, SQL, code execution — standardized and governed.",
        details:["MCP protocol for standardized tool access","Connectors: Jira, Confluence, Salesforce, Slack, SQL","Code execution in Docker sandboxes","Tool catalog with approval workflow","Every tool call logged: inputs, outputs, duration"]},
      {id:"prompts", name:"Prompt Management", icon:"📝", techYouKnow:"Prompt Engineering",
        desc:"Version-controlled prompt store. Create, test, A/B test, and deploy prompts with approval workflows.",
        details:["Git-like versioning with diff views","A/B testing: split traffic between variants","Approval flow: draft → review → staging → production","Variable interpolation — reusable templates","Performance metrics per version: quality, latency, cost"]}
    ]
  },
  {
    id:"data", n:"3", name:"Data & Storage",     tag:"Postgres · Vector DB · Blob · Cache",
    color:"#BA7517", bg:"#FAEEDA",
    desc:"Four purpose-built stores. PostgreSQL for structured data, vector DB for embeddings, Azure Blob for files, Redis for caching. Plus telemetry.",
    talkingPoints:[
      "PostgreSQL is the operational backbone — users, teams, agents, prompts, audit logs, execution history",
      "Vector search via Azure AI Search — managed, hybrid search built-in, native Azure integration",
      "Azure Blob Storage for uploaded files — container-per-team isolation, encrypted, lifecycle tiering (Hot/Cool/Archive)",
      "Redis caches sessions, rate limits, LLM responses — keeps things fast",
      "Telemetry captures every LLM call: tokens, cost, latency — feeds dashboards and cost attribution"
    ],
    components:[
      {id:"postgres", name:"PostgreSQL", icon:"🗄", techYouKnow:"SQL",
        desc:"Primary operational database. Users, teams, agents, prompts, conversations, executions, audit trail.",
        details:["Core tables: users, teams, agents, prompts, messages, executions, audit_log","Agent DAGs stored as validated JSON","Row-level security — teams can only query their own data","Append-only audit table — immutable compliance record","Connection pooling, automated backups, point-in-time recovery"]},
      {id:"vectordb", name:"Vector Search", icon:"🧮", techYouKnow:"Embeddings / Azure",
        desc:"Azure AI Search for semantic search — managed, hybrid vector + keyword, native Azure integration. Weaviate as open-source alt.",
        details:["Azure AI Search: managed hybrid vector + keyword search","Native Azure OpenAI integration for embeddings","Built-in semantic ranker for re-ranking","Weaviate alternative: open-source, self-hosted","HNSW indexing: 10-50ms at millions of vectors"]},
      {id:"objstore", name:"Azure Blob Storage", icon:"📦", techYouKnow:"Azure Blob / Storage Accounts",
        desc:"Object storage for documents and artifacts. Container-per-team isolation via Azure RBAC. SAS tokens for secure direct upload/download. S3-compatible API available for multi-cloud.",
        details:["Container-per-team isolation with Azure RBAC + Managed Identity","SAS tokens for secure direct upload/download (time-limited, scoped)","Encrypted at rest (Azure SSE with Microsoft-managed or customer-managed keys)","Lifecycle management: Hot → Cool → Archive tiers (auto-tiering available)","Geo-redundant storage (GRS) for disaster recovery across Azure regions","Alternative: AWS S3 if multi-cloud — same interface via S3-compatible API"]},
      {id:"cache", name:"Redis Cache", icon:"⚡", techYouKnow:"Caching concepts",
        desc:"In-memory cache for sessions, conversations, rate limits, LLM responses, and provider health.",
        details:["Session data: 24hr TTL","Conversation context: 1hr for active chats","Rate limit counters (sliding window)","LLM response cache saves cost","Pub/sub for real-time streaming"]},
      {id:"telemetry", name:"Telemetry & Cost", icon:"📊", techYouKnow:"SQL / Monitoring",
        desc:"Every LLM call logged. Powers usage dashboards, cost attribution, and budget alerts.",
        details:["Every call: model, tokens, cost, latency, team, agent","Dashboards: cost per team, latency, model usage trends","Budget alerts at 50%, 80%, 95%","At limit: warn, downgrade, or block","Start with PostgreSQL, scale to ClickHouse"]}
    ]
  },
  {
    id:"platform", n:"4", name:"Platform & Governance", tag:"K8s · CI/CD · Security · Observability",
    color:"#D85A30", bg:"#FAECE7",
    desc:"Infrastructure, CI/CD, observability, and cross-cutting security. Kubernetes on Azure, GitOps, and governance guardrails.",
    talkingPoints:[
      "Kubernetes on Azure (AKS) — namespace per environment, auto-scaling",
      "CI/CD via GitOps: push to git → tests → eval benchmarks → canary deploy → rollout",
      "Observability: distributed tracing + AI-specific agent execution tracing",
      "Security: PII detection, input/output guardrails, model allowlists",
      "Governance: new models and tools need review, cost budgets enforced per team"
    ],
    components:[
      {id:"k8s", name:"Kubernetes (AKS)", icon:"☸", techYouKnow:"Docker / K8s / Azure",
        desc:"All services as containers on AKS. Namespace per environment. Auto-scaling. GPU nodes for self-hosted models.",
        details:["AKS — managed control plane","Namespace per env: dev, staging, prod","Horizontal pod autoscaler","GPU node pool (A100) for self-hosted models","Network policies for service isolation"]},
      {id:"cicd", name:"CI/CD Pipeline", icon:"🚀", techYouKnow:"Git / CI-CD / Docker",
        desc:"GitOps: code → tests → security scans → eval benchmarks → canary deploy → full rollout with auto-rollback.",
        details:["GitOps: every deploy is a git commit","PR: lint → test → scan → AI eval benchmarks","Staging must pass quality benchmarks","Production: canary 10% → monitor → rollout","Auto-rollback on SLO violation"]},
      {id:"observability", name:"Observability", icon:"📡", techYouKnow:"Logging / Monitoring",
        desc:"Infra monitoring (metrics, logs, traces) + AI monitoring (agent traces, prompt performance, quality scores).",
        details:["Distributed tracing across all services","Metrics: latency, error rates, throughput + alerting","Structured centralized logs","AI traces: step-by-step agent replay","Dashboards: health, cost, model perf, per-agent quality"]},
      {id:"security", name:"Security & Governance", icon:"🛡", techYouKnow:"General concepts",
        desc:"PII detection, input/output guardrails, model allowlists, immutable audit trail. Enforced at every layer.",
        details:["PII detection (Presidio): scan and redact before external LLMs","Input guardrails: prompt injection, jailbreak detection","Output guardrails: toxicity, hallucination, PII leakage","Model allowlist: security review + eval before production","Immutable audit log for SOC 2, GDPR compliance"]}
    ]
  }
];

const FLOW = [
  {step:1, label:"User sends message", detail:"User types a question in the React portal or sends via the REST API. Includes agent ID, message, conversation ID, and any attachments.", layer:"access", comp:"portal"},
  {step:2, label:"Auth + gateway validates", detail:"API gateway checks JWT against Azure AD. Extracts team/role. Checks rate limits. Generates correlation ID. Routes to orchestrator.", layer:"access", comp:"api"},
  {step:3, label:"Orchestrator runs agent", detail:"Loads agent DAG definition. Creates/resumes conversation session. Walks graph step-by-step: retrieval, LLM calls, tool use, branching. Streams results.", layer:"core", comp:"orchestrator"},
  {step:4, label:"RAG retrieval", detail:"Embeds query → vector + BM25 hybrid search → RRF fusion → cross-encoder re-rank → returns top chunks with source citations.", layer:"core", comp:"knowledge"},
  {step:5, label:"Model router calls LLM", detail:"Selects model based on tier + policy. Applies prompt template. Calls LLM provider. Streams tokens back. Logs token count and cost.", layer:"core", comp:"router"},
  {step:6, label:"Tool execution (if needed)", detail:"If LLM invokes a tool (Jira, SQL, Salesforce), orchestrator routes to MCP layer. Runs sandboxed. Results fed back to LLM.", layer:"core", comp:"tools"},
  {step:7, label:"Guardrails + response", detail:"Output passes through: PII leak check, toxicity filter, hallucination score. Citations formatted. Response streamed to user.", layer:"platform", comp:"security"},
  {step:8, label:"Log, persist, attribute", detail:"Conversation saved. Execution trace stored. Tokens and cost attributed to team budget. Telemetry sent. Audit record written.", layer:"data", comp:"telemetry"}
];

const compMap = {};
LAYERS.forEach(l => { l.components.forEach(c => { compMap[c.id] = {comp:c, layer:l}; }); });

/* ─── Layer List View ─── */
function LayerOverview({ layers, onSelect }) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {layers.map(ly => (
        <div key={ly.id} onClick={() => onSelect(ly.id)}
          style={{display:"flex",alignItems:"center",gap:14,padding:"16px 20px",borderRadius:14,cursor:"pointer",border:"1px solid var(--bdl)",background:"var(--bg1)",transition:"all .15s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=ly.color;e.currentTarget.style.transform="translateX(4px)";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--bdl)";e.currentTarget.style.transform="none";}}>
          <div style={{width:40,height:40,borderRadius:12,background:ly.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,flexShrink:0}}>{ly.n}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:600,color:"var(--tx1)"}}>{ly.name}</div>
            <div style={{fontSize:13,color:"var(--tx3)",marginTop:2}}>{ly.tag}</div>
          </div>
          <div style={{fontSize:13,color:"var(--tx3)"}}>{ly.components.length} →</div>
        </div>
      ))}
    </div>
  );
}

/* ─── Layer Detail ─── */
function LayerDetail({ layer, selComp, onSelect, onBack }) {
  const [openComp, setOpenComp] = useState(selComp);
  const comp = openComp ? layer.components.find(c => c.id === openComp) : null;
  useEffect(() => { setOpenComp(selComp); }, [selComp]);

  return (
    <div className="fi">
      <button onClick={onBack} style={{fontSize:13,color:"var(--tx3)",background:"none",border:"none",cursor:"pointer",padding:"0 0 12px"}}>← All layers</button>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <div style={{width:44,height:44,borderRadius:12,background:layer.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700}}>{layer.n}</div>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:"var(--tx1)"}}>{layer.name}</div>
          <div style={{fontSize:13,color:"var(--tx3)"}}>{layer.tag}</div>
        </div>
      </div>
      <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.7,marginBottom:14}}>{layer.desc}</p>

      <div style={{background:layer.bg,borderRadius:12,padding:"14px 18px",marginBottom:18,border:`1px solid ${layer.color}25`}}>
        <div style={{fontSize:13,fontWeight:600,color:layer.color,marginBottom:8}}>🎤 Key talking points</div>
        {layer.talkingPoints.map((tp,i) => (
          <div key={i} style={{fontSize:13,color:"var(--tx2)",lineHeight:1.65,padding:"4px 0 4px 14px",borderLeft:`2px solid ${layer.color}50`}}>{tp}</div>
        ))}
      </div>

      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
        {layer.components.map(c => (
          <button key={c.id} onClick={() => setOpenComp(openComp === c.id ? null : c.id)}
            style={{padding:"9px 18px",borderRadius:10,fontSize:13,fontWeight:openComp===c.id?600:400,
              color:openComp===c.id?"#fff":layer.color,background:openComp===c.id?layer.color:layer.bg,
              border:"none",cursor:"pointer",transition:"all .15s"}}>{c.icon} {c.name}</button>
        ))}
      </div>

      {comp ? (
        <div className="fi" style={{borderRadius:14,border:"1px solid var(--bdl)",borderLeft:`4px solid ${layer.color}`,padding:20,background:"var(--bg1)"}}>
          <div style={{fontSize:18,fontWeight:600,color:"var(--tx1)",marginBottom:4}}>{comp.icon} {comp.name}</div>
          <div style={{fontSize:12,color:layer.color,fontWeight:600,marginBottom:10,background:layer.bg,display:"inline-block",padding:"3px 10px",borderRadius:6}}>You know: {comp.techYouKnow}</div>
          <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.7,marginBottom:14}}>{comp.desc}</p>
          <div style={{fontSize:13,fontWeight:600,color:"var(--tx1)",marginBottom:8}}>Key capabilities</div>
          {comp.details.map((d,i) => (
            <div key={i} style={{fontSize:13,color:"var(--tx2)",lineHeight:1.6,padding:"4px 0 4px 14px",borderLeft:`2px solid ${layer.color}40`}}>{d}</div>
          ))}
        </div>
      ) : (
        <div style={{padding:20,textAlign:"center",color:"var(--tx3)",fontSize:14,background:"var(--bg2)",borderRadius:12,border:"1px solid var(--bdl)"}}>Select a component above</div>
      )}
    </div>
  );
}

/* ─── Request Flow (accordion) ─── */
function RequestFlow({ onSelect }) {
  const [active, setActive] = useState(null);
  return (
    <div className="fi">
      <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.6,marginBottom:18}}>End-to-end journey — 8 steps from question to answer. Click to expand.</p>
      <div style={{display:"flex",flexDirection:"column",gap:0}}>
        {FLOW.map((s, i) => {
          const ly = LAYERS.find(l => l.id === s.layer);
          const isA = active === i;
          return (
            <div key={i}>
              <div onClick={() => setActive(isA ? null : i)}
                style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",borderRadius:isA?"12px 12px 0 0":12,cursor:"pointer",
                  background:isA ? ly.color : "var(--bg1)",border:`1px solid ${isA ? ly.color : "var(--bdl)"}`,
                  borderBottom:isA?"none":undefined,transition:"all .15s"}}
                onMouseEnter={e=>{if(!isA)e.currentTarget.style.borderColor=ly.color;}}
                onMouseLeave={e=>{if(!isA)e.currentTarget.style.borderColor="var(--bdl)";}}>
                <div style={{width:32,height:32,borderRadius:16,background:isA?"rgba(255,255,255,0.2)":ly.color,color:"#fff",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,flexShrink:0}}>{s.step}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:isA?"#fff":"var(--tx1)"}}>{s.label}</div>
                  <div style={{fontSize:12,color:isA?"rgba(255,255,255,0.7)":ly.color,fontWeight:500}}>{ly.name}</div>
                </div>
                <div style={{fontSize:18,color:isA?"#fff":"var(--tx3)",transition:"transform .2s",transform:isA?"rotate(180deg)":"none"}}>⌄</div>
              </div>
              {isA && (
                <div className="fi" style={{padding:"16px 20px",background:"var(--bg1)",border:`1px solid ${ly.color}40`,borderTop:"none",borderRadius:"0 0 12px 12px",marginBottom:2}}>
                  <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.7,marginBottom:12}}>{s.detail}</p>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button onClick={() => { const info = compMap[s.comp]; if(info) onSelect(info.layer.id, s.comp); }}
                      style={{fontSize:12,padding:"7px 16px",borderRadius:8,background:ly.color+"18",color:ly.color,border:`1px solid ${ly.color}35`,cursor:"pointer",fontWeight:600}}>
                      Explore component →
                    </button>
                    {active>0&&<button onClick={e=>{e.stopPropagation();setActive(active-1);}} style={{fontSize:12,padding:"7px 14px",borderRadius:8,background:"var(--bg3)",color:"var(--tx2)",border:"1px solid var(--bdl)",cursor:"pointer"}}>← Prev</button>}
                    {active<FLOW.length-1&&<button onClick={e=>{e.stopPropagation();setActive(active+1);}} style={{fontSize:12,padding:"7px 14px",borderRadius:8,background:"var(--bg3)",color:"var(--tx2)",border:"1px solid var(--bdl)",cursor:"pointer"}}>Next →</button>}
                  </div>
                </div>
              )}
              {i < FLOW.length - 1 && !isA && !(active===i+1) && (
                <div style={{display:"flex",justifyContent:"flex-start",paddingLeft:30}}>
                  <div style={{width:2,height:8,background:"var(--bdl)"}}/>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [tab, setTab] = useState("diagram");
  const [selLayer, setSelLayer] = useState(null);
  const [selComp, setSelComp] = useState(null);

  const handleSelect = useCallback((layerId, compId) => {
    if (!layerId) { setSelLayer(null); setSelComp(null); }
    else { setSelLayer(layerId); setSelComp(compId || null); setTab("detail"); }
  }, []);

  const layer = selLayer ? LAYERS.find(l => l.id === selLayer) : null;

  const tabs = [
    {id:"diagram", label:"📐 Diagram"},
    {id:"detail", label:"🔍 Explore"},
    {id:"flow", label:"⚡ Request Flow"}
  ];

/* ─── Architecture Diagram (full visual) ─── */
function ArchDiagramFull({ onSelect }) {
  const [activeComp, setActiveComp] = useState(null);
  const comp = activeComp ? compMap[activeComp] : null;

  const layers = [
    {n:"1",name:"Access layer",tag:"Portal / API / Auth",color:"#7F77DD",bg:"#EEEDFE20",bc:"#CECBF6",tc:"#3C3489",
      comps:[{id:"portal",name:"Web portal",sub:"React chat + builder"},{id:"api",name:"API gateway",sub:"FastAPI + rate limits"},{id:"auth",name:"Auth + RBAC",sub:"Azure AD / SSO"}]},
    {n:"2",name:"Core AI services",tag:"Orchestration / RAG / Routing / Tools",color:"#378ADD",bg:"#E6F1FB20",bc:"#B5D4F4",tc:"#0C447C",
      comps:[{id:"orchestrator",name:"Agent orchestrator",sub:"DAG workflows"},{id:"knowledge",name:"Knowledge + RAG",sub:"Hybrid search"},{id:"router",name:"Model router",sub:"Multi-provider"}],
      row2:[{id:"tools",name:"Tool / MCP layer",sub:"Jira, Salesforce, SQL"},{id:"prompts",name:"Prompt registry",sub:"Versioned, A/B tested"},{id:"llm",name:"LLM providers",sub:"Claude, GPT-4o, vLLM",special:true}]},
    {n:"3",name:"Data + storage layer",tag:"Postgres / Vector DB / Blob / Redis / Telemetry",color:"#BA7517",bg:"#FAEEDA20",bc:"#FAC775",tc:"#633806",
      comps:[{id:"postgres",name:"PostgreSQL",sub:"Agents, prompts, audit"},{id:"vectordb",name:"Vector search",sub:"Azure AI Search"},{id:"objstore",name:"Azure Blob",sub:"Files, documents"},{id:"cache",name:"Redis cache",sub:"Sessions, rate limits"},{id:"telemetry",name:"Telemetry",sub:"Cost + usage"}]},
    {n:"4",name:"Platform + governance",tag:"K8s / CI-CD / Observability / Security",color:"#D85A30",bg:"#FAECE720",bc:"#F5C4B3",tc:"#712B13",
      comps:[{id:"k8s",name:"Kubernetes (AKS)",sub:"Containers, GPU"},{id:"cicd",name:"CI/CD pipeline",sub:"GitOps, canary"},{id:"observability",name:"Observability",sub:"Traces, metrics, logs"},{id:"security",name:"Security + governance",sub:"PII, guardrails, audit"}]}
  ];

  const arrows = [
    {label:"requests flow down",color:"#B5D4F4"},
    {label:"reads and writes",color:"#FAC775"},
    {label:"runs on",color:"#F5C4B3"}
  ];

  const compDetails = {};
  LAYERS.forEach(l => l.components.forEach(c => {
    compDetails[c.id] = {name:c.name,tech:c.techYouKnow,color:l.color,bg:l.bg,desc:c.desc,details:c.details};
  }));

  function CompBox({c,ly,isSpecial}) {
    const isActive = activeComp === c.id;
    return (
      <div onClick={(e) => {e.stopPropagation(); setActiveComp(isActive?null:c.id);}}
        style={{flex:1,minWidth:90,maxWidth:180,padding:"10px 12px",borderRadius:10,
          border:`1px solid ${isSpecial?"#9FE1CB":ly.bc}`,cursor:"pointer",transition:"all .15s",textAlign:"center",
          background:isActive?ly.color:(isSpecial?"#E1F5EE30":"var(--bg1)"),
          color:isActive?"#fff":(isSpecial?"#085041":ly.tc),
          transform:isActive?"translateY(-2px)":"none",
          boxShadow:isActive?`0 4px 12px ${ly.color}25`:"none"}}>
        <div style={{fontSize:12,fontWeight:500,lineHeight:1.3}}>{c.name}</div>
        <div style={{fontSize:10,opacity:.7,marginTop:2,lineHeight:1.2}}>{c.sub}</div>
      </div>
    );
  }

  const d = activeComp ? compDetails[activeComp] : null;

  return (
    <div className="fi">
      <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.6,marginBottom:14}}>Traditional architecture diagram — 4 layers, all components, data flow. Click any block to see details.</p>
      {layers.map((ly,li) => (
        <React.Fragment key={ly.n}>
          <div style={{borderRadius:14,padding:14,marginBottom:li<3?2:0,border:`1px solid ${ly.bc}`,background:ly.bg}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:600,color:"#fff",background:ly.color,flexShrink:0}}>{ly.n}</div>
              <div style={{fontSize:14,fontWeight:500,color:"var(--tx1)"}}>{ly.name}</div>
              <div style={{fontSize:11,color:"var(--tx3)",marginLeft:"auto"}}>{ly.tag}</div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {ly.comps.map(c => <CompBox key={c.id} c={c} ly={ly} />)}
            </div>
            {ly.row2 && (
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}>
                {ly.row2.map(c => <CompBox key={c.id} c={c} ly={ly} isSpecial={c.special} />)}
              </div>
            )}
          </div>
          {li < 3 && (
            <div style={{textAlign:"center",padding:"4px 0"}}>
              <svg width="24" height="20" viewBox="0 0 24 20"><path d="M12 2 L12 14 M7 10 L12 16 L17 10" fill="none" stroke={arrows[li].color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              <div style={{fontSize:10,color:"var(--tx3)",letterSpacing:.3}}>{arrows[li].label}</div>
            </div>
          )}
        </React.Fragment>
      ))}

      {d && (
        <div className="fi" key={activeComp} style={{borderRadius:14,padding:20,marginTop:12,border:"1px solid var(--bdl)",borderLeft:`4px solid ${d.color}`,background:"var(--bg1)"}}>
          <div style={{fontSize:18,fontWeight:600,color:"var(--tx1)",marginBottom:4}}>{d.name}</div>
          <div style={{fontSize:12,fontWeight:600,marginBottom:10,background:d.bg,color:d.color,display:"inline-block",padding:"3px 10px",borderRadius:6}}>{d.tech}</div>
          <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.7,marginBottom:14}}>{d.desc}</p>
          <div style={{fontSize:13,fontWeight:600,color:"var(--tx1)",marginBottom:8}}>Key capabilities</div>
          {d.details.map((f,i) => (
            <div key={i} style={{fontSize:13,color:"var(--tx2)",lineHeight:1.6,padding:"4px 0 4px 14px",borderLeft:`2px solid ${d.color}40`}}>{f}</div>
          ))}
          <button onClick={() => { const info = compMap[activeComp]; if(info) onSelect(info.layer.id, activeComp); }}
            style={{marginTop:14,fontSize:12,padding:"7px 16px",borderRadius:8,background:d.color+"18",color:d.color,border:`1px solid ${d.color}35`,cursor:"pointer",fontWeight:600}}>
            Full details in Explore tab →
          </button>
        </div>
      )}
    </div>
  );
}

  return (
    <div style={{maxWidth:740,margin:"0 auto",padding:"28px 16px"}}>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:26,fontWeight:700,color:"var(--tx1)",marginBottom:4}}>Enterprise AI Platform</div>
        <div style={{fontSize:14,color:"var(--tx3)"}}>Azure-native · 4 layers · {LAYERS.reduce((a,l)=>a+l.components.length,0)} components · 8-step request flow</div>
      </div>

      <div style={{display:"flex",gap:4,marginBottom:22,background:"var(--bg2)",borderRadius:10,padding:4,width:"fit-content"}}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => { setTab(t.id); if(t.id!=="detail"){setSelLayer(null);setSelComp(null);} }}
            style={{padding:"9px 18px",fontSize:13,fontWeight:t.id===tab?600:400,
              color:t.id===tab?"#fff":"var(--tx2)",background:t.id===tab?"var(--acc)":"transparent",
              border:"none",borderRadius:7,cursor:"pointer",transition:"all .15s"}}>{t.label}</button>
        ))}
      </div>

      <div style={{minHeight:400}}>
        {tab === "diagram" && <ArchDiagramFull onSelect={handleSelect} />}
        {tab === "detail" && !layer && <LayerOverview layers={LAYERS} onSelect={id => handleSelect(id)} />}
        {tab === "detail" && layer && <LayerDetail layer={layer} selComp={selComp} onSelect={handleSelect} onBack={() => handleSelect(null)} />}
        {tab === "flow" && <RequestFlow onSelect={handleSelect} />}
      </div>

      <div style={{textAlign:"center",marginTop:36,padding:"16px 0",borderTop:"1px solid var(--bdl)",fontSize:12,color:"var(--tx3)"}}>
        Enterprise AI Platform Architecture · Azure-native
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
